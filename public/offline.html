<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline</title>
<style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:#f3f4f6; color:#111827; }
    main { text-align:center; padding:2rem; }
    .code { font-size:3.5rem; margin:0 0 0.25rem; }
    h1 { margin:0 0 0.5rem; }
    p { color:#6b7280; margin:0 0 1rem; }
    button { background:#4f46e5; color:#fff; border:none; border-radius:8px; padding:0.6rem 1.2rem; font:inherit; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<main>
    <p class="code">📡</p>
    <h1>You're offline</h1>
    <p>Check your connection — this page will reload once you're back online.</p>
    <button onclick="location.reload()">Retry</button>
</main>
</body>
</html>
