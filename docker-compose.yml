services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      # Visit http://localhost:8080/install on first run
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    volumes:
      - ./storage:/var/www/html/storage
      - ./themes/uploaded:/var/www/html/themes/uploaded
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: openintranet
      MARIADB_USER: intranet
      MARIADB_PASSWORD: intranet
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 12

  # Local mail testing UI at http://localhost:8025 (SMTP host "mailpit", port 1025)
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"

volumes:
  dbdata:
